<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Contact Form</title>

<!-- Bootstrap CDN -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <div class="container mt-3 pb-3 px-2 bg-muted-subtle">
  <h3 class="bg-info text-light">Bootstrap Contact Form</h3>
  
  <form action="">
    <div class="container bg-light text-muted"> 
    <!-- USER ID (disabled) -->
    <div class="mb-3 mt-3">
      <label class="form-label">User ID</label>
      <input type="text" class="form-control" value="12345" disabled>
    </div>
    <div class="mb-3">
      <label class="form-label">Account Type:</label>
      <input type="text" class="form-control-plaintext" value="Student" readonly>
    </div>
    </div>
  <!-- NAME & EMAIL side by side -->
    <div class="container bg-light">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" class="form-control form-control-lg" placeholder="Enter full name" aria-label="Full Name" id="fullName">
      </div>

      <div class="col-md-4 mb-2">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control form-control-sm" placeholder="Enter email" aria-describedby="emailMsg" id="email">
        <small id="emailMsg" class="form-text text-muted"> Please enter a valid email address</small>
      </div>

    </div>

  <!-- MESSAGE -->
    <div class="mb-3">
      <label for="message" class="form-label">Message</label>
      <textarea class="form-control" rows="3" aria-label="Message" id="message"></textarea>
    </div>
    </div>

  <!-- CONTACT -->
   <div class="container bg-light">
    <div class="mb-3">

      <label class="form-label d-block">Preferred Contact Method</label>

      <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" id="emailCheck">
      <label for="emailCheck" class="form-check-label">Email</label>
    </div>

    <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" id="phoneCheck">
      <label for="phoneCheck" class="form-check-label">Phone</label>
    </div>

    <div class="form-check form-check-inline">
      <input class="form-check-input" type="checkbox" id="whatsappCheck">
      <label for="whatsappCheck" class="form-check-label">WhatsApp</label>
    </div>

    </div>
   </div>
  <!-- FAV COLOR -->
   <div class="container bg-light">
    <div class="mb-3">
      <label for="favColor" class="form-label">Favorite Color</label>
      <input type="color" class="form-control form-control-color" id="favColor" aria-describedby="colorMsg">
      <small id="colorMsg" class="form-text text-muted">Pick your most favorite color</small>
    </div>
    </div>
  <!-- SUBMIT -->
    <button type="submit" class="btn btn-info text-white">Submit</button>
  </form>

  </div>
 
</body>
</html>
